version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: nexus_postgres
    restart: always
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexuspass
      POSTGRES_DB: nexusdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexus_redis
    restart: always
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: nexus_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
