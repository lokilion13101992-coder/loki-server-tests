# === Path 3: Path-based routing ===

server {
    listen 80;
    server_name 149.154.65.75;

    # Главная — статус/информация
    location = / {
        return 200 '<!DOCTYPE html>
<html><head><title>Loki Server</title>
<style>
body{font-family:monospace;background:#0a0a0a;color:#0f0;padding:2rem}
a{color:#0f0;text-decoration:none;border:1px solid #0f0;padding:.5rem 1rem;display:inline-block;margin:.5rem}
a:hover{background:#0f0;color:#000}
h1{color:#0f0;border-bottom:1px solid #0f0;padding-bottom:.5rem}
</style></head>
<body>
<h1>LOKI SERVER</h1>
<p>Services:</p>
<a href="/nexus/">Nexus Core API</a>
<a href="/dashboard/">Loki Dashboard</a>
<a href="/status/">Uptime Kuma</a>
<a href="/portainer/">Portainer</a>
</body></html>';
        default_type text/html;
    }

    location /nexus/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /status/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /portainer/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
